<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>约课 · 教室 · 打印</title>
<style>
  :root {
    --bg-a:#c2ece7; --bg-b:#cce8f4;
    --card:rgba(255,255,255,0.78);
    --card-shadow:0 2px 14px rgba(0,110,100,0.09);
    --text:#1a2e2c; --sub:#5a7a76;
    --border:#c4deda; --input-bg:#f2fbfa;
    --tag-bg:#edf8f6; --out-bg:#eef8f6;
    --placeholder:#9abebb;
    --accent:#0071e3; --green:#28a745;
    --clear-bg:#e4f4f1; --clear-color:#4a7570;
    --toast-bg:#1a2e2c;
    --tab-bg:rgba(255,255,255,0.55);
    --tab-active:rgba(255,255,255,0.92);
  }
  [data-theme="dark"] {
    --bg-a:#0c1d1b; --bg-b:#0d1e2a;
    --card:rgba(18,32,30,0.92);
    --card-shadow:0 2px 16px rgba(0,0,0,0.35);
    --text:#d8eeec; --sub:#6a9e99;
    --border:#25423f; --input-bg:#112420;
    --tag-bg:#112420; --out-bg:#0f201e;
    --placeholder:#3e6560;
    --accent:#3aa0ff; --green:#2ecc6a;
    --clear-bg:#172e2b; --clear-color:#6a9e99;
    --toast-bg:#d8eeec;
    --tab-bg:rgba(18,32,30,0.5);
    --tab-active:rgba(18,32,30,0.95);
  }

  *{box-sizing:border-box;margin:0;padding:0;}

  body{
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB",sans-serif;
    background:linear-gradient(150deg,var(--bg-a) 0%,var(--bg-b) 100%);
    background-attachment:fixed;
    color:var(--text);min-height:100vh;
    padding:24px 16px 56px;
    transition:background .35s,color .25s;
  }
  .container{max-width:520px;margin:0 auto;}

  /* Header */
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
  h1{font-size:21px;font-weight:700;letter-spacing:-.3px;color:var(--text);}
  .theme-btn{
    width:38px;height:38px;border-radius:50%;
    border:1.5px solid var(--border);background:var(--card);
    cursor:pointer;font-size:18px;
    display:flex;align-items:center;justify-content:center;
    transition:all .2s;color:var(--text);box-shadow:var(--card-shadow);
  }
  .theme-btn:hover{transform:scale(1.1);}

  /* Tab bar */
  .tab-bar{
    display:flex;gap:5px;
    background:var(--tab-bg);border-radius:14px;padding:5px;
    margin-bottom:16px;backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,0.3);
  }
  [data-theme="dark"] .tab-bar{border-color:rgba(255,255,255,0.06);}
  .tab-btn{
    flex:1;padding:9px 4px;border-radius:10px;border:none;
    font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;
    background:transparent;color:var(--sub);white-space:nowrap;
  }
  .tab-btn.active{background:var(--tab-active);color:var(--text);box-shadow:0 1px 6px rgba(0,0,0,0.1);}

  /* Card */
  .card{
    background:var(--card);border-radius:16px;
    padding:18px 20px;margin-bottom:10px;
    box-shadow:var(--card-shadow);
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,0.45);
    transition:background .3s,box-shadow .3s;
  }
  [data-theme="dark"] .card{border-color:rgba(255,255,255,0.06);}

  .field-label{
    font-size:11px;font-weight:700;color:var(--sub);
    text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;
  }
  .field-row{display:flex;gap:10px;align-items:center;}

  input{
    width:100%;border:1.5px solid var(--border);border-radius:10px;
    padding:10px 12px;font-size:15px;color:var(--text);
    background:var(--input-bg);outline:none;
    transition:border-color .15s,background .2s;
    appearance:none;-webkit-appearance:none;
  }
  input:focus{border-color:var(--accent);background:var(--card);}
  input::placeholder{color:var(--placeholder);}

  .time-sep{font-size:17px;color:var(--sub);flex-shrink:0;}

  /* Stepper */
  .people-row{display:flex;align-items:center;gap:12px;}
  .stepper{
    display:flex;align-items:center;
    border:1.5px solid var(--border);border-radius:10px;
    overflow:hidden;background:var(--input-bg);
  }
  .stepper button{
    width:40px;height:40px;border:none;background:transparent;
    font-size:20px;cursor:pointer;color:var(--accent);
    display:flex;align-items:center;justify-content:center;
    transition:background .1s;flex-shrink:0;
  }
  .stepper button:hover{background:var(--tag-bg);}
  .stepper button:active{opacity:.7;}
  .stepper-val{
    min-width:36px;text-align:center;font-size:16px;font-weight:700;color:var(--text);
    border-left:1.5px solid var(--border);border-right:1.5px solid var(--border);
    height:40px;line-height:40px;
  }
  .people-label{font-size:14px;color:var(--sub);}

  /* Tags */
  .tags-wrap,.course-tags,.time-tags{display:flex;flex-wrap:wrap;gap:8px;}
  .course-tags{margin-bottom:10px;}
  .time-tags{margin-top:10px;}
  .tag-btn,.course-tag,.time-tag,.school-tag{
    border:1.5px solid var(--border);border-radius:20px;
    padding:7px 14px;font-size:13px;cursor:pointer;
    background:var(--tag-bg);color:var(--sub);
    transition:all .15s;user-select:none;
  }
  .tag-btn:hover,.course-tag:hover,.time-tag:hover,.school-tag:hover{
    border-color:var(--accent);color:var(--accent);
  }
  .tag-btn.active,.course-tag.active,.time-tag.active,.school-tag.active{
    background:var(--accent);border-color:var(--accent);color:#fff;
  }

  /* Output */
  .output-box{
    background:var(--out-bg);border:1.5px solid var(--border);
    border-radius:12px;padding:14px 16px;
    font-size:15px;line-height:1.85;
    white-space:pre-wrap;word-break:break-all;
    min-height:80px;color:var(--text);transition:background .3s;
  }
  .output-box.mono{font-family:"SF Mono","Menlo","Courier New",monospace;font-size:14px;}
  .output-placeholder{color:var(--placeholder);font-size:14px;font-family:inherit;}
  .output-sub-label{
    font-size:12px;font-weight:700;color:var(--sub);
    margin-bottom:7px;margin-top:4px;
  }

  /* Buttons */
  .btn-row{display:flex;gap:10px;margin-top:12px;}
  .btn{
    flex:1;padding:12px 0;border-radius:12px;
    font-size:15px;font-weight:600;cursor:pointer;border:none;
    transition:opacity .15s,transform .1s;
    display:flex;align-items:center;justify-content:center;gap:5px;
  }
  .btn:active{opacity:.8;transform:scale(.97);}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-copy{background:var(--green);color:#fff;}
  .btn-clear{background:var(--clear-bg);color:var(--clear-color);}
  .btn-copy.copied{filter:brightness(.85);}

  /* Print section specifics */
  .p-settings-row{display:flex;gap:20px;}
  .p-setting-col{flex:1;}
  .p-setting-label{font-size:12px;color:var(--sub);margin-bottom:8px;font-weight:600;}
  .p-file-item{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .p-file-item:last-child{margin-bottom:0;}
  .p-file-num{font-size:13px;color:var(--sub);flex-shrink:0;width:22px;font-weight:700;}

  /* Toast */
  .toast{
    position:fixed;bottom:30px;left:50%;
    transform:translateX(-50%) translateY(60px);
    background:var(--toast-bg);color:#fff;
    padding:10px 20px;border-radius:20px;font-size:14px;
    opacity:0;transition:all .25s;pointer-events:none;z-index:999;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .section{display:none;}
  .section.active{display:block;}

  @media(max-width:400px){
    h1{font-size:18px;}
    .btn{font-size:13px;padding:11px 0;}
    .tab-btn{font-size:12px;}
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>约课 · 教室 · 打印</h1>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" id="tab-book"   onclick="switchTab('book')">📋 约课预约</button>
    <button class="tab-btn"        id="tab-notify" onclick="switchTab('notify')">🔔 教室提醒</button>
    <button class="tab-btn"        id="tab-print"  onclick="switchTab('print')">🖨️ 打印资料</button>
  </div>

  <!-- ══ Section 1: 约课预约 ══ -->
  <div class="section active" id="sec-book">
    <div class="card">
      <div class="field-label">日期</div>
      <input type="date" id="b-date">
    </div>
    <div class="card">
      <div class="field-label">时间</div>
      <div class="field-row">
        <input type="time" id="b-start" value="14:00" oninput="bOnStartChange()">
        <span class="time-sep">—</span>
        <input type="time" id="b-end" value="16:00">
      </div>
      <div class="time-tags" id="b-timeTags"></div>
    </div>
    <div class="card">
      <div class="field-label">人数</div>
      <div class="people-row">
        <div class="stepper">
          <button onclick="changePeople(-1)">−</button>
          <div class="stepper-val" id="b-peopleVal">2</div>
          <button onclick="changePeople(1)">＋</button>
        </div>
        <span class="people-label">人</span>
      </div>
    </div>
    <div class="card">
      <div class="field-label">课程内容</div>
      <div class="course-tags" id="b-courseTags"></div>
      <input type="text" id="b-course" placeholder="其他（手动输入）">
    </div>
    <div class="card">
      <div class="field-label">姓名</div>
      <input type="text" id="b-name" placeholder="请输入姓名">
    </div>
    <div class="card">
      <div class="field-label">附加要求（可多选）</div>
      <div class="tags-wrap" id="b-reqTags"></div>
    </div>
    <div class="card">
      <div class="field-label">备注（可选）</div>
      <input type="text" id="b-remark" placeholder="其他补充说明…">
    </div>
    <div class="card">
      <div class="field-label">生成文本</div>
      <div class="output-box" id="b-output"><span class="output-placeholder">点击「生成」查看结果</span></div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="bGenerate()">生成</button>
        <button class="btn btn-copy" id="b-copyBtn" onclick="bCopy()">复制</button>
        <button class="btn btn-clear" onclick="bClear()">清空</button>
      </div>
    </div>
  </div>

  <!-- ══ Section 2: 教室提醒 ══ -->
  <div class="section" id="sec-notify">
    <div class="card">
      <div class="field-label">学生姓名</div>
      <input type="text" id="n-name" placeholder="例：王晨">
    </div>
    <div class="card">
      <div class="field-label">课程类型</div>
      <div class="course-tags" id="n-courseTags"></div>
      <input type="text" id="n-course" placeholder="其他（手动输入）">
    </div>
    <div class="card">
      <div class="field-label">日期</div>
      <input type="date" id="n-date">
    </div>
    <div class="card">
      <div class="field-label">时间</div>
      <div class="field-row">
        <input type="time" id="n-start" value="14:00" oninput="nOnStartChange()">
        <span class="time-sep">—</span>
        <input type="time" id="n-end" value="16:00">
      </div>
      <div class="time-tags" id="n-timeTags"></div>
    </div>
    <div class="card">
      <div class="field-label">教室</div>
      <input type="text" id="n-room" placeholder="例：304">
    </div>
    <div class="card">
      <div class="field-label">生成提醒</div>
      <div class="output-box mono" id="n-output"><span class="output-placeholder">点击「生成」查看结果</span></div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="nGenerate()">生成</button>
        <button class="btn btn-copy" id="n-copyBtn" onclick="nCopy()">复制</button>
        <button class="btn btn-clear" onclick="nClear()">清空</button>
      </div>
    </div>
  </div>

  <!-- ══ Section 3: 打印资料 ══ -->
  <div class="section" id="sec-print">

    <div class="card">
      <div class="field-label">姓名</div>
      <input type="text" id="p-name" placeholder="请输入姓名（用于文件名及落款）">
    </div>

    <div class="card">
      <div class="field-label">课程类型</div>
      <div class="course-tags" id="p-courseTags"></div>
      <input type="text" id="p-course" placeholder="其他（手动输入）">
    </div>

    <div class="card">
      <div class="field-label">日期</div>
      <input type="date" id="p-date">
    </div>

    <div class="card">
      <div class="field-label">班级</div>
      <input type="text" id="p-class" placeholder="例：文科理科线下基础班">
    </div>

    <div class="card">
      <div class="field-label">校区 &amp; 教室号</div>
      <div class="tags-wrap" id="p-schoolTags" style="margin-bottom:10px;"></div>
      <input type="text" id="p-room" placeholder="教室号，例：501">
    </div>

    <div class="card">
      <div class="field-label">打印设置</div>
      <div class="p-settings-row">
        <div class="p-setting-col">
          <div class="p-setting-label">文件数量</div>
          <div class="people-row">
            <div class="stepper">
              <button onclick="pChangeFileCount(-1)">−</button>
              <div class="stepper-val" id="p-fileCountVal">1</div>
              <button onclick="pChangeFileCount(1)">＋</button>
            </div>
            <span class="people-label">个</span>
          </div>
        </div>
        <div class="p-setting-col">
          <div class="p-setting-label">打印份数</div>
          <div class="people-row">
            <div class="stepper">
              <button onclick="pChangeCopies(-1)">−</button>
              <div class="stepper-val" id="p-copiesVal">10</div>
              <button onclick="pChangeCopies(1)">＋</button>
            </div>
            <span class="people-label">份</span>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="field-label">文件名称</div>
      <div id="p-fileInputs"></div>
    </div>

    <div class="card">
      <div class="field-label">生成结果</div>

      <div class="output-sub-label">📄 文件名</div>
      <div class="output-box" id="p-fnOutput" style="min-height:50px;font-size:14px;word-break:break-all;">
        <span class="output-placeholder">点击「生成」查看结果</span>
      </div>
      <div class="btn-row" style="margin-bottom:16px;">
        <button class="btn btn-copy" id="p-fnCopyBtn" onclick="pCopyFilename()">复制文件名</button>
      </div>

      <div class="output-sub-label">📧 邮件正文</div>
      <div class="output-box" id="p-emailOutput">
        <span class="output-placeholder">点击「生成」查看结果</span>
      </div>
      <div class="btn-row" style="margin-bottom:14px;">
        <button class="btn btn-copy" id="p-emailCopyBtn" onclick="pCopyEmail()">复制邮件</button>
      </div>

      <div class="btn-row">
        <button class="btn btn-primary" onclick="pGenerate()">生成</button>
        <button class="btn btn-clear" onclick="pClear()">清空</button>
      </div>
    </div>

  </div><!-- /sec-print -->

</div>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
//  共用常量
// ═══════════════════════════════════════════
const WEEKDAYS  = ["日","月","火","水","木","金","土"];
const COURSES   = ["面谈","VIP","VIP日语","VIP文综","VIP数学"];
const REQ_TAGS  = ["麻烦想要有空调的教室","麻烦想要大一点的教室","麻烦想要有投影的教室"];
const DURATIONS = [["1小时",1],["1.5小时",1.5],["2小时",2],["2.5小时",2.5],["3小时",3]];

const PRINT_COURSES = ["EJU日语","EJU文综","EJU数学","VIP日语","VIP文综","VIP数学","面谈"];
const SCHOOLS = ["精英校区","KS校区"];
const CN_NUM  = ["","一","两","三","四","五","六","七","八","九","十"];

// ═══════════════════════════════════════════
//  约课状态
// ═══════════════════════════════════════════
let bPeople=2, bActiveCourse="", bActiveDuration=null;
let bActiveTags=new Set(), bText="";

// ═══════════════════════════════════════════
//  教室提醒状态
// ═══════════════════════════════════════════
let nActiveCourse="", nActiveDuration=null, nText="";

// ═══════════════════════════════════════════
//  打印资料状态
// ═══════════════════════════════════════════
let pActiveCourse="", pActiveSchool="";
let pCopies=10, pFileCount=1;
let pFileNames=[""];
let pFileName="", pEmailText="";

// ═══════════════════════════════════════════
//  Tab
// ═══════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("sec-"+tab).classList.add("active");
  document.getElementById("tab-"+tab).classList.add("active");
  localStorage.setItem("activeTab",tab);
}

// ═══════════════════════════════════════════
//  工具函数
// ═══════════════════════════════════════════
function todayValue(){
  const d=new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function pad(n){return String(n).padStart(2,"0");}

function fmtDateJa(s){       // 5月27日（水）
  if(!s)return "";
  const d=new Date(s+"T00:00:00");
  return `${d.getMonth()+1}月${d.getDate()}日（${WEEKDAYS[d.getDay()]}）`;
}
function fmtDateShort(s){    // 5月27日
  if(!s)return "";
  const d=new Date(s+"T00:00:00");
  return `${d.getMonth()+1}月${d.getDate()}日`;
}
function fmtDateNotify(s){   // 2026 05 27 （水）
  if(!s)return "";
  const d=new Date(s+"T00:00:00");
  return `${d.getFullYear()} ${pad(d.getMonth()+1)} ${pad(d.getDate())} （${WEEKDAYS[d.getDay()]}）`;
}
function calcEndTime(startVal,hours){
  if(!startVal)return "";
  const[h,m]=startVal.split(":").map(Number);
  const t=h*60+m+hours*60;
  return `${pad(Math.floor(t/60)%24)}:${pad(t%60)}`;
}

// ═══════════════════════════════════════════
//  初始化
// ═══════════════════════════════════════════
function init(){
  // ── 约课 ────────────────────────────────
  document.getElementById("b-date").value=todayValue();
  DURATIONS.forEach(([lbl,h])=>{
    const btn=mkBtn("time-tag",lbl,()=>bSelectDuration(h,btn));
    btn.dataset.hours=h;
    document.getElementById("b-timeTags").appendChild(btn);
  });
  COURSES.forEach(c=>{
    const btn=mkBtn("course-tag",c,()=>bSelectCourse(c,btn));
    document.getElementById("b-courseTags").appendChild(btn);
  });
  document.getElementById("b-course").addEventListener("input",()=>{
    bActiveCourse="";
    document.querySelectorAll("#b-courseTags .course-tag").forEach(b=>b.classList.remove("active"));
  });
  REQ_TAGS.forEach(t=>{
    const btn=mkBtn("tag-btn",t,()=>bToggleReq(t,btn));
    document.getElementById("b-reqTags").appendChild(btn);
  });

  // ── 教室提醒 ─────────────────────────────
  document.getElementById("n-date").value=todayValue();
  DURATIONS.forEach(([lbl,h])=>{
    const btn=mkBtn("time-tag",lbl,()=>nSelectDuration(h,btn));
    btn.dataset.hours=h;
    document.getElementById("n-timeTags").appendChild(btn);
  });
  COURSES.forEach(c=>{
    const btn=mkBtn("course-tag",c,()=>nSelectCourse(c,btn));
    document.getElementById("n-courseTags").appendChild(btn);
  });
  document.getElementById("n-course").addEventListener("input",()=>{
    nActiveCourse="";
    document.querySelectorAll("#n-courseTags .course-tag").forEach(b=>b.classList.remove("active"));
  });

  // ── 打印资料 ─────────────────────────────
  document.getElementById("p-date").value=todayValue();
  PRINT_COURSES.forEach(c=>{
    const btn=mkBtn("course-tag",c,()=>pSelectCourse(c,btn));
    document.getElementById("p-courseTags").appendChild(btn);
  });
  document.getElementById("p-course").addEventListener("input",()=>{
    pActiveCourse="";
    document.querySelectorAll("#p-courseTags .course-tag").forEach(b=>b.classList.remove("active"));
  });
  SCHOOLS.forEach(s=>{
    const btn=mkBtn("school-tag",s,()=>pSelectSchool(s,btn));
    document.getElementById("p-schoolTags").appendChild(btn);
  });
  renderFileInputs();

  // ── 恢复 ────────────────────────────────
  applyTheme(localStorage.getItem("theme")||"light");
  switchTab(localStorage.getItem("activeTab")||"book");
  bRestoreState();
  nRestoreState();
  pRestoreState();
}

function mkBtn(cls,text,onclick){
  const btn=document.createElement("button");
  btn.className=cls; btn.textContent=text; btn.onclick=onclick;
  return btn;
}

// ═══════════════════════════════════════════
//  约课逻辑
// ═══════════════════════════════════════════
function changePeople(d){
  bPeople=Math.max(1,Math.min(20,bPeople+d));
  document.getElementById("b-peopleVal").textContent=bPeople;
}

function bRestoreState(){
  const raw=localStorage.getItem("b_state")||localStorage.getItem("booking_state");
  if(!raw)return;
  try{
    const s=JSON.parse(raw);
    if(s.date) document.getElementById("b-date").value=s.date;
    if(s.start)document.getElementById("b-start").value=s.start;
    if(s.end)  document.getElementById("b-end").value=s.end;
    if(s.course)document.getElementById("b-course").value=s.course;
    const ac=s.bActiveCourse||s.activeCourse;
    if(ac){bActiveCourse=ac;document.querySelectorAll("#b-courseTags .course-tag").forEach(b=>{if(b.textContent===ac)b.classList.add("active");});}
    const ad=s.bActiveDuration??s.activeDuration;

    if(s.name)  document.getElementById("b-name").value=s.name;

    if(bp){bPeople=bp;document.getElementById("b-peopleVal").textContent=bPeople;}
    if(s.tags)s.tags.forEach(tag=>{bActiveTags.add(tag);document.querySelectorAll("#b-reqTags .tag-btn").forEach(b=>{if(b.textContent===tag)b.classList.add("active");});});

// ═══════════════════════════════════════════
function pSelectCourse(c,btn){
  if(pActiveCourse===c){pActiveCourse="";btn.classList.remove("active");}
  else{pActiveCourse=c;document.querySelectorAll("#p-courseTags .course-tag").forEach(b=>b.classList.remove("active"));btn.classList.add("active");document.getElementById("p-course").value="";}
}
function pSelectSchool(s,btn){
  if(pActiveSchool===s){pActiveSchool="";btn.classList.remove("active");}
  else{pActiveSchool=s;document.querySelectorAll("#p-schoolTags .school-tag").forEach(b=>b.classList.remove("active"));btn.classList.add("active");}
}
function pChangeFileCount(d){
  // save current inputs first
  syncFileNames();
  pFileCount=Math.max(1,Math.min(5,pFileCount+d));
  document.getElementById("p-fileCountVal").textContent=pFileCount;
  renderFileInputs();
}
function pChangeCopies(d){
  pCopies=Math.max(1,Math.min(99,pCopies+d));
  document.getElementById("p-copiesVal").textContent=pCopies;
}
function syncFileNames(){
  document.getElementById("p-fileInputs").querySelectorAll("input").forEach((inp,i)=>{pFileNames[i]=inp.value;});
}
function renderFileInputs(){
  while(pFileNames.length<pFileCount)pFileNames.push("");
  const container=document.getElementById("p-fileInputs");
  container.innerHTML="";
  for(let i=0;i<pFileCount;i++){
    const div=document.createElement("div");
    div.className="p-file-item";
    const lbl=document.createElement("span");
    lbl.className="p-file-num";lbl.textContent=`${i+1}.`;
    const inp=document.createElement("input");
    inp.type="text";inp.placeholder="请输入文件名称";
    inp.value=pFileNames[i]||"";
    const idx=i;
    inp.addEventListener("input",()=>{pFileNames[idx]=inp.value;});
    div.appendChild(lbl);div.appendChild(inp);
    container.appendChild(div);
  }
}
function pGenerate(){
  syncFileNames();
  const name  =document.getElementById("p-name").value.trim();
  const course=pActiveCourse||document.getElementById("p-course").value.trim();
  const date  =document.getElementById("p-date").value;
  const cls   =document.getElementById("p-class").value.trim();
  const room  =document.getElementById("p-room").value.trim();
  const schoolRoom=(pActiveSchool||"")+room;

  // 文件名
  const parts=[(course+name).trim(),fmtDateShort(date),cls,schoolRoom,CN_NUM[pFileCount]+"个文件"];
  pFileName=parts.filter(Boolean).join("_");

  // 邮件正文
  const fileList=pFileNames.slice(0,pFileCount).map(f=>`* ${f||"（未填写）"}`).join("\n");
  pEmailText=[
    "教务老师您好，打扰了！",
    "",
    `这是 ${fmtDateJa(date)}${cls} ${schoolRoom}教室上课所需的打印材料。`,
    `请帮忙打印以下${CN_NUM[pFileCount]}个文件，共${pCopies}份：`,
    fileList,
    "PDF文件已整理完毕，作为附件发送。",
    "谢谢老师的辛苦与配合！",
    "",
    name||"（请填写姓名）",
  ].join("\n");

  document.getElementById("p-fnOutput").textContent=pFileName;
  document.getElementById("p-emailOutput").textContent=pEmailText;
  pSaveState();
}
async function pCopyFilename(){
  if(!pFileName){showToast("请先点击「生成」");return;}
  await doCopy(pFileName,"p-fnCopyBtn");
}
async function pCopyEmail(){
  if(!pEmailText){showToast("请先点击「生成」");return;}
  await doCopy(pEmailText,"p-emailCopyBtn");
}

  ["p-name","p-course","p-class","p-room"].forEach(id=>document.getElementById(id).value="");

  pActiveCourse="";pActiveSchool="";

}
function pSaveState(){
  syncFileNames();

}
function pRestoreState(){
  const raw=localStorage.getItem("p_state");if(!raw)return;
  try{
    const s=JSON.parse(raw);
    if(s.name)  document.getElementById("p-name").value=s.name;
    if(s.course)document.getElementById("p-course").value=s.course;
    if(s.pActiveCourse){pActiveCourse=s.pActiveCourse;document.querySelectorAll("#p-courseTags .course-tag").forEach(b=>{if(b.textContent===pActiveCourse)b.classList.add("active");});}
    if(s.pActiveSchool){pActiveSchool=s.pActiveSchool;document.querySelectorAll("#p-schoolTags .school-tag").forEach(b=>{if(b.textContent===pActiveSchool)b.classList.add("active");});}
    if(s.date)document.getElementById("p-date").value=s.date;
    if(s.cls) document.getElementById("p-class").value=s.cls;
    if(s.room)document.getElementById("p-room").value=s.room;
    if(s.pCopies){pCopies=s.pCopies;document.getElementById("p-copiesVal").textContent=pCopies;}
    if(s.pFileCount){pFileCount=s.pFileCount;document.getElementById("p-fileCountVal").textContent=pFileCount;}
    if(s.pFileNames)pFileNames=s.pFileNames;
    renderFileInputs();
  }catch{}
}

// ═══════════════════════════════════════════
//  深夜模式
// ═══════════════════════════════════════════
function toggleTheme(){
  const next=document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark";
  applyTheme(next);localStorage.setItem("theme",next);
}
function applyTheme(t){
  document.documentElement.setAttribute("data-theme",t);
  document.getElementById("themeBtn").textContent=t==="dark"?"☀️":"🌙";
}

// ═══════════════════════════════════════════
//  共用
// ═══════════════════════════════════════════
async function doCopy(text,btnId){
  try{
    await navigator.clipboard.writeText(text);
    const btn=document.getElementById(btnId);
    const orig=btn.textContent;
    btn.textContent="已复制 ✓";btn.classList.add("copied");
    setTimeout(()=>{btn.textContent=orig;btn.classList.remove("copied");},2000);
    showToast("已复制到剪贴板");
  }catch{showToast("复制失败，请手动选中复制");}
}
function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

init();
