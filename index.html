<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>约课信息生成器</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", sans-serif;
    background: #f5f5f7;
    color: #1d1d1f;
    min-height: 100vh;
    padding: 24px 16px 48px;
  }

  .container {
    max-width: 520px;
    margin: 0 auto;
  }

  h1 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 24px;
    letter-spacing: -0.3px;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .field-label {
    font-size: 12px;
    font-weight: 600;
    color: #6e6e73;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 8px;
  }

  .field-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  input, select {
    width: 100%;
    border: 1.5px solid #e0e0e5;
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 15px;
    color: #1d1d1f;
    background: #fafafa;
    outline: none;
    transition: border-color 0.15s;
    appearance: none;
    -webkit-appearance: none;
  }

  input:focus, select:focus {
    border-color: #0071e3;
    background: #fff;
  }

  .time-sep {
    font-size: 18px;
    color: #6e6e73;
    flex-shrink: 0;
    padding: 0 2px;
  }

  .people-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .stepper {
    display: flex;
    align-items: center;
    gap: 0;
    border: 1.5px solid #e0e0e5;
    border-radius: 10px;
    overflow: hidden;
    background: #fafafa;
  }

  .stepper button {
    width: 40px;
    height: 40px;
    border: none;
    background: transparent;
    font-size: 20px;
    cursor: pointer;
    color: #0071e3;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s;
    flex-shrink: 0;
  }

  .stepper button:hover { background: #f0f0f5; }
  .stepper button:active { background: #e5e5ea; }

  .stepper-val {
    min-width: 36px;
    text-align: center;
    font-size: 16px;
    font-weight: 600;
    color: #1d1d1f;
    border-left: 1.5px solid #e0e0e5;
    border-right: 1.5px solid #e0e0e5;
    height: 40px;
    line-height: 40px;
  }

  .people-label {
    font-size: 14px;
    color: #6e6e73;
  }

  /* Tags */
  .tags-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .tag-btn {
    border: 1.5px solid #e0e0e5;
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 13px;
    cursor: pointer;
    background: #fafafa;
    color: #3a3a3c;
    transition: all 0.15s;
    user-select: none;
  }

  .tag-btn:hover { border-color: #0071e3; color: #0071e3; }

  .tag-btn.active {
    background: #0071e3;
    border-color: #0071e3;
    color: #fff;
  }

  /* Course tags (single-select) */
  .course-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 10px;
  }

  .course-tag {
    border: 1.5px solid #e0e0e5;
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 13px;
    cursor: pointer;
    background: #fafafa;
    color: #3a3a3c;
    transition: all 0.15s;
    user-select: none;
  }

  .course-tag:hover { border-color: #0071e3; color: #0071e3; }

  .course-tag.active {
    background: #0071e3;
    border-color: #0071e3;
    color: #fff;
  }

  /* Output */
  .output-box {
    background: #f9f9fb;
    border: 1.5px solid #e0e0e5;
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 15px;
    line-height: 1.8;
    white-space: pre-wrap;
    word-break: break-all;
    min-height: 130px;
    color: #1d1d1f;
  }

  .output-placeholder {
    color: #aeaeb2;
    font-size: 14px;
  }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }

  .btn {
    flex: 1;
    padding: 12px 0;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: opacity 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .btn:active { opacity: 0.8; transform: scale(0.98); }

  .btn-primary { background: #0071e3; color: #fff; }
  .btn-copy    { background: #34c759; color: #fff; }
  .btn-clear   { background: #f2f2f7; color: #6e6e73; }

  .btn-copy.copied { background: #1a9e40; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: #1d1d1f;
    color: #fff;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 14px;
    opacity: 0;
    transition: all 0.25s;
    pointer-events: none;
    z-index: 999;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  section + section { margin-top: 0; }

  @media (max-width: 400px) {
    h1 { font-size: 19px; }
    .btn-row { gap: 7px; }
    .btn { font-size: 13px; padding: 11px 0; }
  }
</style>
</head>
<body>

<div class="container">
  <h1>约课信息生成器</h1>

  <!-- 日期 -->
  <div class="card">
    <div class="field-label">日期</div>
    <input type="date" id="dateInput">
  </div>

  <!-- 时间 -->
  <div class="card">
    <div class="field-label">时间</div>
    <div class="field-row">
      <input type="time" id="startTime" value="14:00">
      <span class="time-sep">—</span>
      <input type="time" id="endTime" value="16:00">
    </div>
  </div>

  <!-- 人数 -->
  <div class="card">
    <div class="field-label">人数</div>
    <div class="people-row">
      <div class="stepper">
        <button onclick="changePeople(-1)">−</button>
        <div class="stepper-val" id="peopleVal">2</div>
        <button onclick="changePeople(1)">＋</button>
      </div>
      <span class="people-label">人</span>
    </div>
  </div>

  <!-- 内容 -->
  <div class="card">
    <div class="field-label">课程内容</div>
    <div class="course-tags" id="courseTags"></div>
    <input type="text" id="courseInput" placeholder="其他（手动输入）">
  </div>

  <!-- 姓名 -->
  <div class="card">
    <div class="field-label">姓名</div>
    <input type="text" id="nameInput" placeholder="请输入姓名">
  </div>

  <!-- Tag -->
  <div class="card">
    <div class="field-label">附加要求（可多选）</div>
    <div class="tags-wrap" id="tagsWrap"></div>
  </div>

  <!-- 备注 -->
  <div class="card">
    <div class="field-label">备注（可选）</div>
    <input type="text" id="remarkInput" placeholder="其他补充说明…">
  </div>

  <!-- 输出 -->
  <div class="card">
    <div class="field-label">生成文本</div>
    <div class="output-box" id="outputBox">
      <span class="output-placeholder">点击「生成」查看结果</span>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="generate()">生成</button>
      <button class="btn btn-copy" id="copyBtn" onclick="copyText()">复制</button>
      <button class="btn btn-clear" onclick="clearAll()">清空</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── 常量 ──────────────────────────────────────────
  const TAGS = [
    "麻烦想要有空调的教室",
    "麻烦想要大一点的教室",
    "麻烦想要有投影的教室",
  ];

  const COURSES = ["面谈", "VIP", "VIP日语", "VIP文综", "VIP数学"];

  const WEEKDAYS = ["日", "一", "二", "三", "四", "五", "六"];

  // ── 状态 ──────────────────────────────────────────
  let people = 2;
  let activeTags = new Set();
  let activeCourse = "";
  let generatedText = "";

  // ── 初始化 ────────────────────────────────────────
  function init() {
    // 默认今天
    const today = new Date();
    document.getElementById("dateInput").value = formatDateValue(today);

    // 课程 tags（单选）
    const ct = document.getElementById("courseTags");
    COURSES.forEach(c => {
      const btn = document.createElement("button");
      btn.className = "course-tag";
      btn.textContent = c;
      btn.onclick = () => selectCourse(c, btn);
      ct.appendChild(btn);
    });

    // 手动输入时取消课程 tag 选中
    document.getElementById("courseInput").addEventListener("input", () => {
      activeCourse = "";
      document.querySelectorAll(".course-tag").forEach(b => b.classList.remove("active"));
    });

    // Tag 按钮
    const tw = document.getElementById("tagsWrap");
    TAGS.forEach(t => {
      const btn = document.createElement("button");
      btn.className = "tag-btn";
      btn.textContent = t;
      btn.onclick = () => toggleTag(t, btn);
      tw.appendChild(btn);
    });

    // 恢复上次记录
    restoreState();
  }

  // ── 工具函数 ──────────────────────────────────────
  function formatDateValue(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
  }

  function formatDateDisplay(dateStr) {
    if (!dateStr) return "";
    const d = new Date(dateStr + "T00:00:00");
    const m = d.getMonth() + 1;
    const day = d.getDate();
    const w = WEEKDAYS[d.getDay()];
    return `${m}月${day}日（${w}）`;
  }

  // ── 人数 ──────────────────────────────────────────
  function changePeople(delta) {
    people = Math.max(1, Math.min(20, people + delta));
    document.getElementById("peopleVal").textContent = people;
  }

  // ── 课程单选 ──────────────────────────────────────
  function selectCourse(course, btn) {
    if (activeCourse === course) {
      activeCourse = "";
      btn.classList.remove("active");
    } else {
      activeCourse = course;
      document.querySelectorAll(".course-tag").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById("courseInput").value = "";
    }
  }

  // ── Tag ───────────────────────────────────────────
  function toggleTag(tag, btn) {
    if (activeTags.has(tag)) {
      activeTags.delete(tag);
      btn.classList.remove("active");
    } else {
      activeTags.add(tag);
      btn.classList.add("active");
    }
  }

  // ── 生成 ──────────────────────────────────────────
  function generate() {
    const date    = document.getElementById("dateInput").value;
    const start   = document.getElementById("startTime").value;
    const end     = document.getElementById("endTime").value;
    const course  = activeCourse || document.getElementById("courseInput").value.trim();
    const name    = document.getElementById("nameInput").value.trim();
    const remark  = document.getElementById("remarkInput").value.trim();

    const tagList = [...activeTags];
    const tagStr  = tagList.length ? `（${tagList.join("、")}）` : "";

    let lines = [];
    lines.push(`教务老师您好，想要预约一下教室${tagStr}`);
    if (date)   lines.push(`日期：${formatDateDisplay(date)}`);
    if (start && end) lines.push(`时间：${start}-${end}`);
    lines.push(`人数：${people}人`);
    if (course) lines.push(`内容：${course}`);
    if (name)   lines.push(`姓名：${name}`);
    if (remark) lines.push(`备注：${remark}`);

    generatedText = lines.join("\n");

    const box = document.getElementById("outputBox");
    box.textContent = generatedText;

    saveState();
  }

  // ── 复制 ──────────────────────────────────────────
  async function copyText() {
    if (!generatedText) { showToast("请先点击「生成」"); return; }
    try {
      await navigator.clipboard.writeText(generatedText);
      const btn = document.getElementById("copyBtn");
      btn.textContent = "已复制 ✓";
      btn.classList.add("copied");
      setTimeout(() => { btn.textContent = "复制"; btn.classList.remove("copied"); }, 2000);
      showToast("已复制到剪贴板");
    } catch {
      showToast("复制失败，请手动选中文字复制");
    }
  }

  // ── 清空 ──────────────────────────────────────────
  function clearAll() {
    document.getElementById("dateInput").value = formatDateValue(new Date());
    document.getElementById("startTime").value = "14:00";
    document.getElementById("endTime").value   = "16:00";
    document.getElementById("courseInput").value = "";
    document.getElementById("nameInput").value   = "";
    document.getElementById("remarkInput").value = "";
    people = 2;
    document.getElementById("peopleVal").textContent = "2";

    activeTags.clear();
    document.querySelectorAll(".tag-btn").forEach(b => b.classList.remove("active"));
    activeCourse = "";
    document.querySelectorAll(".course-tag").forEach(b => b.classList.remove("active"));

    generatedText = "";
    const box = document.getElementById("outputBox");
    box.innerHTML = '<span class="output-placeholder">点击「生成」查看结果</span>';

    localStorage.removeItem("booking_state");
    showToast("已清空");
  }

  // ── Toast ─────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2000);
  }

  // ── 持久化（记住上次） ────────────────────────────
  function saveState() {
    const state = {
      date:         document.getElementById("dateInput").value,
      start:        document.getElementById("startTime").value,
      end:          document.getElementById("endTime").value,
      course:       document.getElementById("courseInput").value,
      activeCourse,
      name:         document.getElementById("nameInput").value,
      remark:       document.getElementById("remarkInput").value,
      people,
      tags: [...activeTags],
    };
    localStorage.setItem("booking_state", JSON.stringify(state));
  }

  function restoreState() {
    const raw = localStorage.getItem("booking_state");
    if (!raw) return;
    try {
      const s = JSON.parse(raw);
      if (s.date)   document.getElementById("dateInput").value   = s.date;
      if (s.start)  document.getElementById("startTime").value   = s.start;
      if (s.end)    document.getElementById("endTime").value     = s.end;
      if (s.course) document.getElementById("courseInput").value = s.course;
      if (s.activeCourse) {
        activeCourse = s.activeCourse;
        document.querySelectorAll(".course-tag").forEach(btn => {
          if (btn.textContent === s.activeCourse) btn.classList.add("active");
        });
      }
      if (s.name)   document.getElementById("nameInput").value   = s.name;
      if (s.remark) document.getElementById("remarkInput").value = s.remark;
      if (s.people) {
        people = s.people;
        document.getElementById("peopleVal").textContent = people;
      }
      if (s.tags) {
        s.tags.forEach(tag => {
          activeTags.add(tag);
          document.querySelectorAll(".tag-btn").forEach(btn => {
            if (btn.textContent === tag) btn.classList.add("active");
          });
        });
      }
    } catch {}
  }

  // ── 启动 ──────────────────────────────────────────
  init();
</script>
</body>
</html>
