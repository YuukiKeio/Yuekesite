<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>约课信息生成器</title>
<style>
  /* ── CSS 变量 ── */
  :root {
    --bg-a: #c2ece7;
    --bg-b: #cce8f4;
    --card:  rgba(255,255,255,0.78);
    --card-shadow: 0 2px 14px rgba(0,110,100,0.09);
    --text:  #1a2e2c;
    --sub:   #5a7a76;
    --border:#c4deda;
    --input-bg: #f2fbfa;
    --tag-bg:   #edf8f6;
    --out-bg:   #eef8f6;
    --placeholder: #9abebb;
    --accent: #0071e3;
    --accent-dark: #005bbf;
    --green:  #28a745;
    --clear-bg:    #e4f4f1;
    --clear-color: #4a7570;
    --toast-bg: #1a2e2c;
  }
  [data-theme="dark"] {
    --bg-a: #0c1d1b;
    --bg-b: #0d1e2a;
    --card:  rgba(18,32,30,0.92);
    --card-shadow: 0 2px 16px rgba(0,0,0,0.35);
    --text:  #d8eeec;
    --sub:   #6a9e99;
    --border:#25423f;
    --input-bg: #112420;
    --tag-bg:   #112420;
    --out-bg:   #0f201e;
    --placeholder: #3e6560;
    --accent: #3aa0ff;
    --accent-dark: #1a88ee;
    --green:  #2ecc6a;
    --clear-bg:    #172e2b;
    --clear-color: #6a9e99;
    --toast-bg: #d8eeec;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", sans-serif;
    background: linear-gradient(150deg, var(--bg-a) 0%, var(--bg-b) 100%);
    background-attachment: fixed;
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 56px;
    transition: background 0.35s, color 0.25s;
  }

  .container { max-width: 520px; margin: 0 auto; }

  /* ── 标题栏 ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 22px;
  }

  h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  .theme-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--card);
    cursor: pointer;
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    color: var(--text);
    box-shadow: var(--card-shadow);
  }
  .theme-btn:hover { transform: scale(1.1); }

  /* ── カード ── */
  .card {
    background: var(--card);
    border-radius: 16px;
    padding: 18px 20px;
    margin-bottom: 10px;
    box-shadow: var(--card-shadow);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.45);
    transition: background 0.3s, box-shadow 0.3s;
  }
  [data-theme="dark"] .card {
    border-color: rgba(255,255,255,0.06);
  }

  .field-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--sub);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 10px;
  }

  /* ── 输入 ── */
  .field-row { display: flex; gap: 10px; align-items: center; }

  input, select {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 15px;
    color: var(--text);
    background: var(--input-bg);
    outline: none;
    transition: border-color 0.15s, background 0.2s;
    appearance: none;
    -webkit-appearance: none;
  }
  input:focus { border-color: var(--accent); background: var(--card); }
  input::placeholder { color: var(--placeholder); }

  .time-sep { font-size: 17px; color: var(--sub); flex-shrink: 0; }

  /* ── 时间 tag ── */
  .time-tags { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }

  /* ── 人数 ── */
  .people-row { display: flex; align-items: center; gap: 12px; }

  .stepper {
    display: flex; align-items: center;
    border: 1.5px solid var(--border);
    border-radius: 10px; overflow: hidden;
    background: var(--input-bg);
  }
  .stepper button {
    width: 40px; height: 40px; border: none;
    background: transparent; font-size: 20px;
    cursor: pointer; color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.1s; flex-shrink: 0;
  }
  .stepper button:hover { background: var(--tag-bg); }
  .stepper button:active { opacity: 0.7; }
  .stepper-val {
    min-width: 36px; text-align: center;
    font-size: 16px; font-weight: 700; color: var(--text);
    border-left: 1.5px solid var(--border);
    border-right: 1.5px solid var(--border);
    height: 40px; line-height: 40px;
  }
  .people-label { font-size: 14px; color: var(--sub); }

  /* ── 通用 tag 样式 ── */
  .tags-wrap, .course-tags, .time-tags {
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .course-tags { margin-bottom: 10px; }

  .tag-btn, .course-tag, .time-tag {
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 13px;
    cursor: pointer;
    background: var(--tag-bg);
    color: var(--sub);
    transition: all 0.15s;
    user-select: none;
  }
  .tag-btn:hover, .course-tag:hover, .time-tag:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .tag-btn.active, .course-tag.active, .time-tag.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* ── 输出框 ── */
  .output-box {
    background: var(--out-bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 15px;
    line-height: 1.85;
    white-space: pre-wrap;
    word-break: break-all;
    min-height: 130px;
    color: var(--text);
    transition: background 0.3s;
  }
  .output-placeholder { color: var(--placeholder); font-size: 14px; }

  /* ── 按钮 ── */
  .btn-row { display: flex; gap: 10px; margin-top: 14px; }

  .btn {
    flex: 1; padding: 12px 0;
    border-radius: 12px;
    font-size: 15px; font-weight: 600;
    cursor: pointer; border: none;
    transition: opacity 0.15s, transform 0.1s;
    display: flex; align-items: center; justify-content: center; gap: 5px;
  }
  .btn:active { opacity: 0.8; transform: scale(0.97); }

  .btn-primary { background: var(--accent); color: #fff; }
  .btn-copy    { background: var(--green);  color: #fff; }
  .btn-clear   { background: var(--clear-bg); color: var(--clear-color); }
  .btn-copy.copied { filter: brightness(0.85); }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--toast-bg); color: var(--card);
    padding: 10px 20px; border-radius: 20px;
    font-size: 14px; opacity: 0;
    transition: all 0.25s; pointer-events: none; z-index: 999;
  }
  [data-theme="dark"] .toast { color: var(--bg-a); }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 400px) {
    h1 { font-size: 19px; }
    .btn { font-size: 13px; padding: 11px 0; }
  }
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <h1>约课信息生成器</h1>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="切换深夜模式">🌙</button>
  </div>

  <!-- 日期 -->
  <div class="card">
    <div class="field-label">日期</div>
    <input type="date" id="dateInput">
  </div>

  <!-- 时间 -->
  <div class="card">
    <div class="field-label">时间</div>
    <div class="field-row">
      <input type="time" id="startTime" value="14:00" oninput="onStartTimeChange()">
      <span class="time-sep">—</span>
      <input type="time" id="endTime" value="16:00">
    </div>
    <div class="time-tags" id="timeTags"></div>
  </div>

  <!-- 人数 -->
  <div class="card">
    <div class="field-label">人数</div>
    <div class="people-row">
      <div class="stepper">
        <button onclick="changePeople(-1)">−</button>
        <div class="stepper-val" id="peopleVal">2</div>
        <button onclick="changePeople(1)">＋</button>
      </div>
      <span class="people-label">人</span>
    </div>
  </div>

  <!-- 内容 -->
  <div class="card">
    <div class="field-label">课程内容</div>
    <div class="course-tags" id="courseTags"></div>
    <input type="text" id="courseInput" placeholder="其他（手动输入）">
  </div>

  <!-- 姓名 -->
  <div class="card">
    <div class="field-label">姓名</div>
    <input type="text" id="nameInput" placeholder="请输入姓名">
  </div>

  <!-- 附加要求 -->
  <div class="card">
    <div class="field-label">附加要求（可多选）</div>
    <div class="tags-wrap" id="tagsWrap"></div>
  </div>

  <!-- 备注 -->
  <div class="card">
    <div class="field-label">备注（可选）</div>
    <input type="text" id="remarkInput" placeholder="其他补充说明…">
  </div>

  <!-- 输出 -->
  <div class="card">
    <div class="field-label">生成文本</div>
    <div class="output-box" id="outputBox">
      <span class="output-placeholder">点击「生成」查看结果</span>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="generate()">生成</button>
      <button class="btn btn-copy" id="copyBtn" onclick="copyText()">复制</button>
      <button class="btn btn-clear" onclick="clearAll()">清空</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  // ── 常量 ──────────────────────────────────────────
  const TAGS = [
    "麻烦想要有空调的教室",
    "麻烦想要大一点的教室",
    "麻烦想要有投影的教室",
  ];

  const COURSES = ["面谈", "VIP", "VIP日语", "VIP文综", "VIP数学"];

  // 时间 tag：[显示文字, 小时数]
  const TIME_DURATIONS = [
    ["1小时",   1],
    ["1.5小时", 1.5],
    ["2小时",   2],
    ["2.5小时", 2.5],
    ["3小时",   3],
  ];

  const WEEKDAYS = ["日", "月", "火", "水", "木", "金", "土"];

  // ── 状态 ──────────────────────────────────────────
  let people = 2;
  let activeTags = new Set();
  let activeCourse = "";
  let activeDuration = null; // 数字或 null
  let generatedText = "";

  // ── 初始化 ────────────────────────────────────────
  function init() {
    document.getElementById("dateInput").value = formatDateValue(new Date());

    // 时间 tag
    const tt = document.getElementById("timeTags");
    TIME_DURATIONS.forEach(([label, hours]) => {
      const btn = document.createElement("button");
      btn.className = "time-tag";
      btn.textContent = label;
      btn.dataset.hours = hours;
      btn.onclick = () => selectDuration(hours, btn);
      tt.appendChild(btn);
    });

    // 课程 tag
    const ct = document.getElementById("courseTags");
    COURSES.forEach(c => {
      const btn = document.createElement("button");
      btn.className = "course-tag";
      btn.textContent = c;
      btn.onclick = () => selectCourse(c, btn);
      ct.appendChild(btn);
    });

    document.getElementById("courseInput").addEventListener("input", () => {
      activeCourse = "";
      document.querySelectorAll(".course-tag").forEach(b => b.classList.remove("active"));
    });

    // 附加要求 tag
    const tw = document.getElementById("tagsWrap");
    TAGS.forEach(t => {
      const btn = document.createElement("button");
      btn.className = "tag-btn";
      btn.textContent = t;
      btn.onclick = () => toggleTag(t, btn);
      tw.appendChild(btn);
    });

    // 深色模式
    const savedTheme = localStorage.getItem("theme") || "light";
    applyTheme(savedTheme);

    restoreState();
  }

  // ── 日期格式 ──────────────────────────────────────
  function formatDateValue(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
  }

  function formatDateDisplay(dateStr) {
    if (!dateStr) return "";
    const d = new Date(dateStr + "T00:00:00");
    const m = d.getMonth() + 1;
    const day = d.getDate();
    const w = WEEKDAYS[d.getDay()];
    return `${m}月${day}日（${w}）`;
  }

  // ── 人数 ──────────────────────────────────────────
  function changePeople(delta) {
    people = Math.max(1, Math.min(20, people + delta));
    document.getElementById("peopleVal").textContent = people;
  }

  // ── 时间 tag ──────────────────────────────────────
  function selectDuration(hours, btn) {
    if (activeDuration === hours) {
      activeDuration = null;
      btn.classList.remove("active");
    } else {
      activeDuration = hours;
      document.querySelectorAll(".time-tag").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      applyDuration(hours);
    }
  }

  function applyDuration(hours) {
    const startVal = document.getElementById("startTime").value;
    if (!startVal) return;
    const [h, m] = startVal.split(":").map(Number);
    const totalMins = h * 60 + m + hours * 60;
    const endH = Math.floor(totalMins / 60) % 24;
    const endM = totalMins % 60;
    document.getElementById("endTime").value =
      String(endH).padStart(2, "0") + ":" + String(endM).padStart(2, "0");
  }

  function onStartTimeChange() {
    if (activeDuration !== null) applyDuration(activeDuration);
  }

  // ── 课程单选 ──────────────────────────────────────
  function selectCourse(course, btn) {
    if (activeCourse === course) {
      activeCourse = "";
      btn.classList.remove("active");
    } else {
      activeCourse = course;
      document.querySelectorAll(".course-tag").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById("courseInput").value = "";
    }
  }

  // ── 附加要求 tag ──────────────────────────────────
  function toggleTag(tag, btn) {
    if (activeTags.has(tag)) {
      activeTags.delete(tag);
      btn.classList.remove("active");
    } else {
      activeTags.add(tag);
      btn.classList.add("active");
    }
  }

  // ── 生成 ──────────────────────────────────────────
  function generate() {
    const date   = document.getElementById("dateInput").value;
    const start  = document.getElementById("startTime").value;
    const end    = document.getElementById("endTime").value;
    const course = activeCourse || document.getElementById("courseInput").value.trim();
    const name   = document.getElementById("nameInput").value.trim();
    const remark = document.getElementById("remarkInput").value.trim();

    const tagStr = [...activeTags].length
      ? `（${[...activeTags].join("、")}）` : "";

    const lines = [];
    lines.push(`教务老师您好，想要预约一下教室${tagStr}`);
    if (date)          lines.push(`日期：${formatDateDisplay(date)}`);
    if (start && end)  lines.push(`时间：${start}-${end}`);
    lines.push(`人数：${people}人`);
    if (course)        lines.push(`内容：${course}`);
    if (name)          lines.push(`姓名：${name}`);
    if (remark)        lines.push(`备注：${remark}`);

    generatedText = lines.join("\n");
    document.getElementById("outputBox").textContent = generatedText;
    saveState();
  }

  // ── 复制 ──────────────────────────────────────────
  async function copyText() {
    if (!generatedText) { showToast("请先点击「生成」"); return; }
    try {
      await navigator.clipboard.writeText(generatedText);
      const btn = document.getElementById("copyBtn");
      btn.textContent = "已复制 ✓";
      btn.classList.add("copied");
      setTimeout(() => { btn.textContent = "复制"; btn.classList.remove("copied"); }, 2000);
      showToast("已复制到剪贴板");
    } catch {
      showToast("复制失败，请手动选中复制");
    }
  }

  // ── 清空 ──────────────────────────────────────────
  function clearAll() {
    document.getElementById("dateInput").value    = formatDateValue(new Date());
    document.getElementById("startTime").value    = "14:00";
    document.getElementById("endTime").value      = "16:00";
    document.getElementById("courseInput").value  = "";
    document.getElementById("nameInput").value    = "";
    document.getElementById("remarkInput").value  = "";
    people = 2;
    document.getElementById("peopleVal").textContent = "2";

    activeTags.clear();
    document.querySelectorAll(".tag-btn").forEach(b => b.classList.remove("active"));
    activeCourse = "";
    document.querySelectorAll(".course-tag").forEach(b => b.classList.remove("active"));
    activeDuration = null;
    document.querySelectorAll(".time-tag").forEach(b => b.classList.remove("active"));

    generatedText = "";
    document.getElementById("outputBox").innerHTML =
      '<span class="output-placeholder">点击「生成」查看结果</span>';
    localStorage.removeItem("booking_state");
    showToast("已清空");
  }

  // ── 深夜模式 ──────────────────────────────────────
  function toggleTheme() {
    const current = document.documentElement.getAttribute("data-theme");
    const next = current === "dark" ? "light" : "dark";
    applyTheme(next);
    localStorage.setItem("theme", next);
  }

  function applyTheme(theme) {
    document.documentElement.setAttribute("data-theme", theme);
    document.getElementById("themeBtn").textContent = theme === "dark" ? "☀️" : "🌙";
  }

  // ── Toast ─────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2000);
  }

  // ── 持久化 ────────────────────────────────────────
  function saveState() {
    localStorage.setItem("booking_state", JSON.stringify({
      date:          document.getElementById("dateInput").value,
      start:         document.getElementById("startTime").value,
      end:           document.getElementById("endTime").value,
      course:        document.getElementById("courseInput").value,
      activeCourse,
      activeDuration,
      name:          document.getElementById("nameInput").value,
      remark:        document.getElementById("remarkInput").value,
      people,
      tags: [...activeTags],
    }));
  }

  function restoreState() {
    const raw = localStorage.getItem("booking_state");
    if (!raw) return;
    try {
      const s = JSON.parse(raw);
      if (s.date)   document.getElementById("dateInput").value  = s.date;
      if (s.start)  document.getElementById("startTime").value  = s.start;
      if (s.end)    document.getElementById("endTime").value    = s.end;
      if (s.course) document.getElementById("courseInput").value = s.course;
      if (s.activeCourse) {
        activeCourse = s.activeCourse;
        document.querySelectorAll(".course-tag").forEach(b => {
          if (b.textContent === s.activeCourse) b.classList.add("active");
        });
      }
      if (s.activeDuration != null) {
        activeDuration = s.activeDuration;
        document.querySelectorAll(".time-tag").forEach(b => {
          if (Number(b.dataset.hours) === s.activeDuration) b.classList.add("active");
        });
      }
      if (s.name)   document.getElementById("nameInput").value   = s.name;
      if (s.remark) document.getElementById("remarkInput").value = s.remark;
      if (s.people) {
        people = s.people;
        document.getElementById("peopleVal").textContent = people;
      }
      if (s.tags) s.tags.forEach(tag => {
        activeTags.add(tag);
        document.querySelectorAll(".tag-btn").forEach(b => {
          if (b.textContent === tag) b.classList.add("active");
        });
      });
    } catch {}
  }

  // ── 启动 ──────────────────────────────────────────
  init();
</script>
</body>
</html>
